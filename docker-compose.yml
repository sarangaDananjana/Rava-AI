version: '3.8'

services:
  # --- POSTGRESQL DATABASE ---
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- DJANGO WEB APPLICATION ---
  web:
    build: .
    # Single-line production command running migrations and Gunicorn
    command: sh -c "python manage.py makemigrations && python manage.py migrate && gunicorn rava.wsgi:application --bind 0.0.0.0:8000"
    restart: unless-stopped
    ports:
      # Binds the container's port 8000 to the host's port 8001 securely
      - "127.0.0.1:8001:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      - db
    volumes:
      # Keeps media safe without overwriting production code
      - media_data:/app/media

volumes:
  postgres_data:
  media_data:
