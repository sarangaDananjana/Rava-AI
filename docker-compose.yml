version: '3.8'

services:
  # --- POSTGRESQL DATABASE ---
  db:
    # Using the lightest possible official PostgreSQL image
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Maps the database data to a persistent Docker volume
      - postgres_data:/var/lib/postgresql/data

  # --- DJANGO WEB APPLICATION ---
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Database connection variables matching the DB service
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      - db
    volumes:
      # Syncs your local code with the container (Great for local development)
      - .:/app
      # PERSISTENT MEDIA VOLUME: Keeps all audio files safe
      - media_data:/app/media

# Define the persistent volumes
volumes:
  postgres_data:
  media_data:
